name: Changelog Generation

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "cliff.toml"
      - ".github/workflows/changelog.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable

      - name: Install git-cliff
        run: |
          cargo install git-cliff --locked

      - name: Generate changelog (unreleased)
        run: |
          # Ensure we have git history with tags
          git fetch --unshallow || true
          git fetch --tags || true

          # Generate changelog with better error handling
          if git cliff --config cliff.toml --unreleased --strip header > CHANGELOG_UNRELEASED.md; then
            echo "✅ Generated unreleased changelog successfully"
            echo "📄 Preview (first 100 lines):"
            head -100 CHANGELOG_UNRELEASED.md
          else
            echo "❌ Failed to generate changelog"
            echo "🔍 Debugging information:"
            echo "Current git status:"
            git status --porcelain
            echo "Available tags:"
            git tag -l | head -10
            echo "Recent commits:"
            git log --oneline -10
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: changelog-unreleased
          path: CHANGELOG_UNRELEASED.md
