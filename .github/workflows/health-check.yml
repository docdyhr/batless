name: Repository Health Check

on:
  schedule:
    - cron: "0 6 * * 3"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    uses: docdyhr/.github/.github/workflows/rust-health-check.yml@45a390baa5d5e6b3cd058b0d16023410297ede84 # v1
    secrets: inherit # pragma: allowlist secret
