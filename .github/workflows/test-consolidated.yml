name: Comprehensive Testing

# Replaced by ci-optimized.yml for push/PR — this runs weekly for broader coverage
on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-comprehensive:
    uses: docdyhr/.github/.github/workflows/rust-test-comprehensive.yml@6cd3461708816bc6918c0efebd720d1fee435be0 # v1
    with:
      msrv: "1.85.0"
    secrets: inherit # pragma: allowlist secret

  # batless-specific integration test suites (run after comprehensive matrix)
  integration:
    name: Integration Tests
    needs: test-comprehensive
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-integration-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run integration test suites
        run: |
          cargo test --test integration_tests --verbose
          cargo test --test cli_coverage_tests --verbose
          cargo test --test property_tests --verbose
          cargo test --test streaming_coverage_tests --verbose
