name: Release Management

on:
  push:
    tags: ["v*"]
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.0.0)"
        required: true

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
      attestations: write
      id-token: write
    uses: docdyhr/.github/.github/workflows/rust-release.yml@45a390baa5d5e6b3cd058b0d16023410297ede84 # v1
    with:
      binary-name: batless
    secrets: inherit # pragma: allowlist secret

  # Homebrew tap update — runs after GitHub release is created
  update-homebrew:
    name: Update Homebrew Tap
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    uses: ./.github/workflows/update-homebrew.yml
    with:
      tag: ${{ github.ref_name }}
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  # Auto-tag when a release PR is merged
  tag-after-merge:
    name: Tag After Release PR
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.merged == true &&
      (startsWith(github.event.pull_request.title, 'release ') ||
       startsWith(github.event.pull_request.title, 'chore(release)'))
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version and push tag
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ $PR_TITLE =~ release[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            TAG="v${BASH_REMATCH[1]}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
          else
            echo "No semver found in PR title: $PR_TITLE"
            exit 1
          fi
