name: Security Review

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  security:
    uses: docdyhr/.github/.github/workflows/rust-security.yml@45a390baa5d5e6b3cd058b0d16023410297ede84 # v1
    secrets: inherit # pragma: allowlist secret
