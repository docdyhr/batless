name: Security Review

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  security:
    uses: docdyhr/.github/.github/workflows/rust-security.yml@6cd3461708816bc6918c0efebd720d1fee435be0 # v1
    secrets: inherit # pragma: allowlist secret
