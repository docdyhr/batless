# Caller for the reusable CodeQL workflow in docdyhr/.github.
# To upgrade across all consumers, re-tag v1 in docdyhr/.github.

name: CodeQL Analysis

permissions: read-all

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  codeql:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: docdyhr/.github/.github/workflows/codeql.yml@45a390baa5d5e6b3cd058b0d16023410297ede84 # v1
    with:
      languages: '["rust"]'
    secrets: inherit # pragma: allowlist secret
