name: Performance Management

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
    inputs:
      update_baseline:
        description: "Update performance baseline"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  benchmark:
    uses: docdyhr/.github/.github/workflows/rust-benchmark.yml@6cd3461708816bc6918c0efebd720d1fee435be0 # v1
    with:
      binary-name: batless
      benchmark-script: scripts/benchmark.sh
    secrets: inherit # pragma: allowlist secret
