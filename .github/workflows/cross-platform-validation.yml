name: Cross-Platform Validation

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      test_type:
        description: "Type of cross-platform test to run"
        required: true
        default: "full"
        type: choice
        options: [full, quick, targets-only]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-platform:
    uses: docdyhr/.github/.github/workflows/rust-cross-platform.yml@6cd3461708816bc6918c0efebd720d1fee435be0 # v1
    with:
      binary-name: batless
      test-type: ${{ inputs.test_type || 'full' }}
    secrets: inherit # pragma: allowlist secret
