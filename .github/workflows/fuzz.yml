name: Fuzz Testing

on:
  pull_request:
    branches: [ main ]
  schedule:
    # Run fuzz tests weekly on Saturdays at 03:00 UTC
    - cron: '0 3 * * 6'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz-tokenizer:
    name: Tokenizer Fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust (nightly for fuzzing)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Initialize fuzzing (if needed)
        run: |
          chmod +x scripts/setup-fuzzing.sh
          ./scripts/setup-fuzzing.sh

      - name: Run tokenizer fuzz target (short run)
        run: |
          cargo fuzz run tokenizer -- -runs=50000 || true

      - name: Archive fuzz artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/

  summary:
    name: Fuzz Summary
    runs-on: ubuntu-latest
    needs: [fuzz-tokenizer]
    if: always()
    steps:
      - name: Download fuzz artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts/
        continue-on-error: true
      - name: Report status
        env:
          FUZZ_RESULT: ${{ needs.fuzz-tokenizer.result }}
        run: |
          if [ "$FUZZ_RESULT" = "success" ]; then
            echo "✅ Fuzzing completed without crashes" > fuzz-summary.md
          else
            echo "⚠️ Fuzzing encountered issues (non-blocking)" > fuzz-summary.md
          fi
          if [ -d fuzz/artifacts ]; then
            if ls fuzz/artifacts/* 1> /dev/null 2>&1; then
              {
                echo ""
                echo "### Artifacts"
                echo ""
                echo "The following artifacts were generated:"
                ls -1 fuzz/artifacts/ || true
              } >> fuzz-summary.md
            fi
          fi
          cat fuzz-summary.md
      - name: Comment PR with fuzz summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            if (fs.existsSync('fuzz-summary.md')) {
              const body = fs.readFileSync('fuzz-summary.md', 'utf8');
              try {
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: '## 🧪 Fuzzing Report\n\n' + body
                });
              } catch (error) {
                console.log('Failed to comment on PR:', error.message);
                console.log('Fuzzing summary:', body);
              }
            }
